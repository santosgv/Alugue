<!-- blog/templates/blog/partials/post_card.html -->
<div class="card h-100 shadow-sm hover-lift">
    {% if post.imagem_destaque %}
        <img src="{{ post.imagem_destaque.url }}" 
             class="card-img-top" 
             alt="{{ post.titulo }}"
             style="height: 200px; object-fit: cover;">
    {% else %}
        <div class="card-img-top bg-secondary" style="height: 200px;">
            <div class="d-flex align-items-center justify-content-center h-100 text-white">
                <i class="fas fa-image fa-3x opacity-50"></i>
            </div>
        </div>
    {% endif %}
    
    <div class="card-body d-flex flex-column">
        <div class="mb-2">
            <span class="badge bg-{{ post.categoria.cor }} small">
                <i class="fas {{ post.categoria.icone|default:'fa-tag' }}"></i>
                {{ post.categoria.nome }}
            </span>
            {% if post.destaque %}
                <span class="badge bg-warning text-dark small">
                    <i class="fas fa-star"></i> Destaque
                </span>
            {% endif %}
        </div>
        
        <h5 class="card-title">
            <a href="{{ post.get_absolute_url }}" class="text-decoration-none text-dark">
                {{ post.titulo }}
            </a>
        </h5>
        
        <p class="card-text text-muted small flex-grow-1">
            {{ post.resumo|truncatechars:120 }}
        </p>
        
        <div class="mt-3">
            <div class="d-flex justify-content-between align-items-center text-muted small">
                <span>
                    <i class="fas fa-calendar-alt"></i>
                    {{ post.published_at|date:"d/m/Y" }}
                </span>
                <span>
                    <i class="fas fa-clock"></i>
                    {{ post.get_tempo_leitura }} min
                </span>
                <span>
                    <i class="fas fa-eye"></i>
                    {{ post.views }}
                </span>
            </div>
            <a href="{{ post.get_absolute_url }}" class="btn btn-outline-primary btn-sm w-100 mt-2">
                Ler mais <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>
</div>
