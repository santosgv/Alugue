{% extends 'base.html' %}
{% block title %}Excluir Cliente{% endblock %}
{% block page_title %}Excluir Cliente{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="form-card text-center">
      <div style="width:64px;height:64px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;color:#ef4444;">
        <i class="bi bi-trash"></i>
      </div>
      <h5 class="fw-bold">Excluir Cliente?</h5>
      <p class="text-muted">Tem certeza que deseja excluir <strong>{{ object.nome }}</strong>? Esta ação não pode ser desfeita.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-4">
        {% csrf_token %}
        <a href="{% url 'clientes:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-2"></i>Excluir</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
