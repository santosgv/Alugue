
{% block extra_css %}
<style>
  /* ── Compartilhado entre todos os relatórios ── */
  .rel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  .rel-header h1 { font-size:1.35rem; font-weight:700; color:#1e293b; margin:0; }
  .rel-header p  { font-size:.82rem; color:#64748b; margin:3px 0 0; }

  .rel-filtros {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .rel-filtros .form-label { font-size:.8rem; font-weight:600; color:#64748b; margin:0; }

  .rel-kpi {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 20px 22px;
  }
  .rel-kpi-value { font-size:1.75rem; font-weight:800; color:#1e293b; line-height:1; }
  .rel-kpi-label { font-size:.78rem; color:#64748b; font-weight:500; margin-top:4px; }
  .rel-kpi-icon  {
    width:42px; height:42px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.15rem; margin-bottom:12px;
  }
  .kpi-red    .rel-kpi-icon { background:#fef2f2; color:#ef4444; }
  .kpi-green  .rel-kpi-icon { background:#f0fdf4; color:#22c55e; }
  .kpi-blue   .rel-kpi-icon { background:#eff6ff; color:#3b82f6; }
  .kpi-amber  .rel-kpi-icon { background:#fffbeb; color:#f59e0b; }
  .kpi-purple .rel-kpi-icon { background:#faf5ff; color:#8b5cf6; }

  .table-card { background:#fff; border-radius:14px; border:1px solid #e2e8f0; overflow:hidden; }
  .table-card .table { margin:0; }
  .table-card thead th {
    background:#f8fafc; color:#64748b;
    font-size:.7rem; font-weight:600;
    text-transform:uppercase; letter-spacing:.6px;
    border-bottom:1px solid #e2e8f0; padding:11px 16px;
  }
  .table-card td { padding:12px 16px; vertical-align:middle; border-color:#f1f5f9; font-size:.875rem; }
  .table-card tbody tr:hover { background:#f8fafc; }

  .bar-bg { background:#f1f5f9; border-radius:4px; height:8px; overflow:hidden; }
  .bar-fill { height:8px; border-radius:4px; transition:width .4s ease; }

  .badge-atraso {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 10px; border-radius:20px;
    font-size:.7rem; font-weight:700;
  }
  .atraso-critico { background:#fef2f2; color:#dc2626; }
  .atraso-alto    { background:#fff7ed; color:#c2410c; }
  .atraso-medio   { background:#fefce8; color:#a16207; }

  .rank-num {
    width:28px; height:28px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:.75rem; font-weight:700;
  }
  .rank-1 { background:#fef9c3; color:#ca8a04; }
  .rank-2 { background:#f1f5f9; color:#64748b; }
  .rank-3 { background:#fff7ed; color:#c2410c; }
  .rank-n { background:#f8fafc; color:#94a3b8; }

  /* Gráfico de barras CSS */
  .chart-bars { display:flex; align-items:flex-end; gap:6px; height:140px; padding:0 4px; }
  .chart-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .chart-bar {
    width:100%; border-radius:6px 6px 0 0;
    background:linear-gradient(to top,#3b82f6,#60a5fa);
    min-height:4px; transition:height .3s ease;
  }
  .chart-label { font-size:.65rem; color:#94a3b8; text-align:center; white-space:nowrap; }
  .chart-value { font-size:.65rem; color:#64748b; font-weight:600; }

  .empty-rel { text-align:center; padding:52px 20px; color:#94a3b8; }
  .empty-rel i { font-size:2.8rem; display:block; margin-bottom:10px; }
</style>
{% endblock %}
